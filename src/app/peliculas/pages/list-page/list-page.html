<h1>Listado de Películas</h1>

<div class="grid mb-4">
    <div class="col-12">
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Buscar por título...</mat-label>
        <mat-icon matPrefix>search</mat-icon>
        <input matInput
               placeholder="Ej. Spider-Man"
               (keyup)="onBuscar($event)">
      </mat-form-field>
    </div>
  </div>

<div class="grid mb-8">

  @for (peli of listadoPelis; track peli.id) {
    <div class="col-12 sm:col-6 md:col-4 xl:col-3 flex">
      <peliculas-peli-card [pelicula]="peli" class="w-full"></peliculas-peli-card>
    </div>
  }

</div>
