<div class="container mt-4">
  <div class="header-section">
    <h1>Mis Películas Favoritas</h1>
    <p>Gestiona las películas que has guardado en tu lista.</p>
  </div>

  <mat-divider class="mb-4"></mat-divider>


    @if (listadoFavoritas.length > 0) {
      <div class="grid mb-8">
    @for (peli of listadoFavoritas; track peli.id) {
      <div class="col-12 sm:col-6 md:col-4 xl:col-3 flex">
        <peliculas-peli-card
          [pelicula]="peli"
          (onEliminarFav)="eliminarDeLaVista($event)"
          class="w-full">
        </peliculas-peli-card>
      </div>
    }
      </div>
    } @else {
      <div class="empty-favorites">
        <mat-icon>favorite_border</mat-icon>
        <h3>No tienes favoritas todavía</h3>
        <p>Explora el catálogo y añade películas pulsando en el corazón.</p>
        <button mat-raised-button color="primary" routerLink="/peliculas/listado">
          Ver películas
        </button>
      </div>
    }


</div>
